<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TransitWave Logistics Tracking</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>TransitWave Logistics</h1>
    <p>Track your shipments in real time</p>
  </header>

  <main>
    <div class="tracker-box">
      <input type="text" id="trackingInput" placeholder="Enter tracking number">
      <button onclick="trackShipment()">Track Shipment</button>
    </div>

    <div id="result" class="result-box"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
